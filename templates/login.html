<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VENDIX</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@9"></script>
    <script src="https://cdn.jsdelivr.net/npm/promise-polyfill"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
    <link rel="icon" href="{{ url_for('static', filename='img/logo.ico') }}" />
    <style>
        @font-face {
            font-family: 'ONE-Mobile-POP';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2105_2@1.0/ONE-Mobile-POP.woff') format('woff');
        }

        @font-face {
            font-family: 'KOHIBaeumOTF';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2201-2@1.0/KOHIBaeumOTF.woff') format('woff');
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'KOHIBaeumOTF', sans-serif;
            color: #101828;
            background:
                radial-gradient(circle at top left, rgba(86, 111, 255, 0.13), transparent 32%),
                radial-gradient(circle at 85% 15%, rgba(22, 212, 176, 0.13), transparent 22%),
                linear-gradient(160deg, #f8fbff 0%, #eef4ff 48%, #e7efff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .login-shell {
            width: min(92vw, 1080px);
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 30px 90px rgba(36, 58, 107, 0.15);
            backdrop-filter: blur(18px);
        }

        .login-brand {
            padding: 64px 56px;
            background:
                linear-gradient(180deg, rgba(79, 124, 255, 0.18), rgba(79, 124, 255, 0.03)),
                rgba(248, 251, 255, 0.88);
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
        }

        .brand-kicker {
            font-family: 'ONE-Mobile-POP', sans-serif;
            letter-spacing: 0.14em;
            color: #9bb4ff;
            text-transform: uppercase;
            font-size: 14px;
        }

        .login-brand h1 {
            font-family: 'ONE-Mobile-POP', sans-serif;
            font-size: clamp(42px, 6vw, 70px);
            margin: 0;
            letter-spacing: 0.08em;
        }

        .login-brand p {
            margin: 0;
            color: #42526b;
            font-size: 18px;
            line-height: 1.7;
        }

        .brand-badge {
            width: fit-content;
            padding: 10px 16px;
            border-radius: 999px;
            background: rgba(47, 107, 255, 0.1);
            color: #3b4f6a;
            font-size: 14px;
        }

        .login-panel {
            padding: 64px 48px 86px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .login-panel h2 {
            margin: 0 0 10px;
            font-size: 34px;
            color: #111827;
        }

        .login-panel .subtext {
            margin: 0 0 28px;
            color: #5c6b82;
        }

        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            margin-bottom: 8px;
            color: #334155;
            font-size: 14px;
        }

        .field input {
            width: 100%;
            border: 1px solid rgba(15, 23, 42, 0.12);
            border-radius: 16px;
            padding: 16px 18px;
            background: #ffffff;
            color: #111827;
            font-size: 16px;
            transition: border-color 0.2s ease, transform 0.2s ease, background 0.2s ease;
            caret-color: #111827;
            -webkit-text-fill-color: #111827;
        }

        .field input::placeholder {
            color: #9aa7ba;
        }

        .field input:focus {
            outline: none;
            border-color: #3b82f6;
            background: #ffffff;
            transform: translateY(-1px);
        }

        .field input:-webkit-autofill,
        .field input:-webkit-autofill:hover,
        .field input:-webkit-autofill:focus {
            -webkit-text-fill-color: #111827;
            box-shadow: 0 0 0px 1000px #ffffff inset;
            transition: background-color 5000s ease-in-out 0s;
        }

        .password-wrap {
            position: relative;
        }

        .password-wrap input {
            padding-right: 76px;
        }

        .pw-inline-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            border: 1px solid rgba(15, 23, 42, 0.12);
            border-radius: 10px;
            width: 42px;
            height: 34px;
            font-size: 18px;
            font-weight: 700;
            color: #334155;
            background: #ffffff;
            cursor: pointer;
            display: grid;
            place-items: center;
        }

        .pw-inline-btn:hover {
            background: #f8fafc;
        }

        .login-btn {
            width: 100%;
            margin-top: 8px;
            padding: 16px 18px;
            border: none;
            border-radius: 16px;
            font-family: 'ONE-Mobile-POP', sans-serif;
            letter-spacing: 0.08em;
            background: linear-gradient(135deg, #4f7cff, #13c5a5);
            color: #ffffff;
            box-shadow: 0 18px 35px rgba(61, 113, 255, 0.28);
        }

        .login-btn:hover {
            filter: brightness(1.05);
        }

        .discord-link {
            position: absolute;
            right: 28px;
            bottom: 24px;
            color: #5a6f93;
            text-decoration: none;
            font-size: 14px;
        }

        .discord-link:hover {
            color: #1f2f4a;
            text-decoration: none;
        }

        @media (max-width: 860px) {
            .login-shell {
                grid-template-columns: 1fr;
            }

            .login-brand {
                padding: 36px 28px 18px;
            }

            .login-panel {
                padding: 28px 24px 72px;
            }
        }
    </style>
</head>
<body>
    <div class="login-shell">
        <section class="login-brand">
            <span class="brand-kicker">Auto Vending Panel</span>
            <h1>VENDIX</h1>
            <p>디스코드 서버 전용 자판기 설정, 상품 관리, 라이선스 관리까지 한 곳에서 처리하는 웹패널입니다.</p>
            <div class="brand-badge">Fast setup · Discord based · License managed</div>
        </section>
        <section class="login-panel">
            <h2>관리자 로그인</h2>
            <p class="subtext">서버 ID와 웹패널 비밀번호를 입력하세요.</p>
            <form class="login-form" onsubmit="event.preventDefault(); login();">
                <div class="field">
                    <label for="login-id">서버 ID</label>
                    <input id="login-id" type="text" name="id" class="id" placeholder="서버 ID">
                </div>
                <div class="field">
                    <label for="login-pw">비밀번호</label>
                    <div class="password-wrap">
                        <input id="login-pw" type="password" name="pw" class="pw" placeholder="웹패널 비밀번호">
                        <button type="button" id="togglePw" class="pw-inline-btn">🙈</button>
                    </div>
                </div>
                <button type="submit" class="login-btn">LOGIN</button>
            </form>
            <a href="https://discord.gg/XeSCG3cd" class="discord-link" target="_blank">Discord</a>
        </section>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var toggle = document.getElementById("togglePw");
            var pwInput = document.getElementById("login-pw");
            if (toggle && pwInput) {
                toggle.addEventListener("click", function () {
                    var show = pwInput.type === "password";
                    pwInput.type = show ? "text" : "password";
                    toggle.textContent = show ? "👁" : "🙈";
                });
            }
        });

        function login() {
            var id = document.querySelector('.id').value;
            var pw = document.querySelector('.pw').value;

            if (id == "" || pw == "") {
                Swal.fire({
                    title: '로그인 실패',
                    text: '아이디와 비밀번호를 입력해주세요.',
                    icon: "error"
                });
                return;
            }

            $.ajax({
                url: "/login",
                type: "post",
                data: { id: id, pw: pw },
            }).done(function (data) {
                if (data == "Ok") {
                    Swal.fire({
                        title: '로그인 성공',
                        text: '관리 패널로 이동합니다.',
                        icon: "success"
                    }).then(() => {
                        window.location.href = '/setting'
                    });
                } else {
                    Swal.fire({
                        title: '로그인 실패',
                        text: data,
                        icon: 'error'
                    });
                }
            });
        }
    </script>
</body>
</html>
