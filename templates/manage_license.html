<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>VENDIX</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@9"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
    crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/vendix-theme.css') }}">
  <script src="{{ url_for('static', filename='js/vendix-theme.js') }}"></script>
  <link rel="icon" href="{{ url_for('static', filename='img/logo.ico') }}" />
  <style>
    @font-face {
      font-family: 'ONE-Mobile-POP';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2105_2@1.0/ONE-Mobile-POP.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'KOHIBaeumOTF';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2201-2@1.0/KOHIBaeumOTF.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }
    body { background: #141418; }
    a { font-family: 'ONE-Mobile-POP'; font-size: 18px; }
    #logout { color: red; }
  </style>
  <script>
    function logout_button() {
      Swal.fire({
        title: '로그아웃',
        text: '정말로 로그아웃하시겠습니까?',
        icon: 'question',
        showCancelButton: true,
        cancelButtonColor: '#d33',
        confirmButtonColor: '#009900',
        confirmButtonText: '확인',
        cancelButtonText: '취소'
      }).then((result) => {
        if (result.isConfirmed) window.location.href = '/logout';
      });
    }

    function manage() {
      const code = (document.getElementById("code").value || "").trim();
      if (!code) {
        Swal.fire('라이센스 등록 실패', '라이센스 코드를 입력해주세요.', 'error');
        return;
      }
      Swal.fire({
        title: '라이센스 등록',
        text: '라이센스를 등록하시겠습니까?',
        icon: 'warning',
        showCancelButton: true,
        cancelButtonColor: '#d33',
        confirmButtonColor: '#009900'
      }).then((result) => {
        if (!result.isConfirmed) return;
        $.ajax({
          url: "/license",
          type: "post",
          data: $("form").serialize(),
        }).done(function (data) {
          if ($.isNumeric(data)) {
            Swal.fire('라이센스 등록 성공', `등록된 라이센스 기간: ${data}일`, 'success');
          } else {
            Swal.fire('라이센스 등록 실패', data, 'error');
          }
        });
      });
    }
  </script>
</head>
<body class="vendix-panel">
  <nav class="navbar navbar-expand-lg navbar-light" style="background-color: #232329;">
    <div class="container-fluid">
      <a class="navbar-brand" href="/setting" style="color: whitesmoke;">VENDIX</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
        aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon custom-toggler"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0" style="margin-left: auto; margin-right: auto; text-align: center;">
          <li class="nav-item"><a class="nav-link active" href="/setting" style="color: whitesmoke;">기본 설정</a></li>&nbsp;&nbsp;
          <li class="nav-item"><a class="nav-link active" href="/manage_user" style="color: whitesmoke;">유저 관리</a></li>&nbsp;&nbsp;
          <li class="nav-item"><a class="nav-link active" href="/manage_product" style="color: whitesmoke;">제품 관리</a></li>&nbsp;&nbsp;
          <li class="nav-item"><a class="nav-link active" href="/buy_log" style="color: whitesmoke;">구매 로그</a></li>&nbsp;&nbsp;
          <li class="nav-item"><a class="nav-link active" href="/charge_log" style="color: whitesmoke;">충전 로그</a></li>&nbsp;&nbsp;
          <li class="nav-item"><a class="nav-link active" href="/managereq" style="color: whitesmoke;">충전 신청 관리</a></li>&nbsp;&nbsp;
          <li class="nav-item"><a class="nav-link active" href="/license" style="color: whitesmoke;">라이센스 관리</a></li>&nbsp;&nbsp;
          <li class="nav-item"><a class="nav-link active" href="https://discord.gg/P29QZE6Kzr" style="color: rgb(87, 87, 223);">디스코드</a></li>&nbsp;&nbsp;
          <li class="nav-item"><a class="nav-link active" href="#" onclick="logout_button();" id="logout">로그아웃</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid">
    <div style="padding:20px;">
      <br><br>
      <form name="form">
        <div class="form-group">
          <h2 style="color: white; font-family: 'KOHIBaeumOTF'; font-size: 35px;">남은 라이센스 기간<br>{{ expire }}</h2><br>
          <div class="card" style="border: solid 1px #232323; font-family: 'KOHIBaeumOTF';">
            <div class="card-header" style="background-color: #232329; color: white;">라이센스 등록</div>
            <div class="card-body" style="background-color: #232329; font-family: 'KOHIBaeumOTF';">
              <div class="container">
                <div class="row">
                  <div class="col-md-12">
                    <input class="form-control" id="code" placeholder="라이센스 코드" name="code">
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </form>
      <div style="float: right;">
        <button class="btn btn-primary" onclick="manage();">코드 등록</button>&nbsp;&nbsp;
      </div>
    </div>
  </div>
</body>
</html>
